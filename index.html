<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>
body {
    margin: 0;
    padding: 20px;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
}

h1 {
    text-align: center;
}

#status {
    text-align: center;
    margin-bottom: 20px;
}

#gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 15px;
}

.image-card {
    background: #222;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #444;
}

.image-card img {
    width: 100%;
    display: block;
}

.image-name {
    padding: 10px;
    word-break: break-word;
    font-size: 14px;
}
</style>
</head>
<body>

<h1>Image Gallery</h1>
<div id="status">Loading...</div>
<div id="gallery"></div>

<script>
const GITHUB_USERNAME = "94321cbouncymochi";
const GITHUB_REPO = "hippomech";
const FOLDER = "images";

const gallery = document.getElementById("gallery");
const status = document.getElementById("status");

async function loadImages() {
    try {
        const response = await fetch(
            `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${FOLDER}`
        );

        if (!response.ok) {
            throw new Error("Could not access repository");
        }

        const files = await response.json();

        const images = files.filter(file =>
            /\.(png|jpg|jpeg|gif|webp|svg)$/i.test(file.name)
        );

        status.textContent = `Found ${images.length} image(s)`;

        for (const file of images) {
            const card = document.createElement("div");
            card.className = "image-card";

            const img = document.createElement("img");
            img.src = file.download_url;
            img.loading = "lazy";

            const name = document.createElement("div");
            name.className = "image-name";
            name.textContent = file.name;

            card.appendChild(img);
            card.appendChild(name);

            gallery.appendChild(card);
        }
    } catch (error) {
        status.textContent = "Error loading images.";
        console.error(error);
    }
}

loadImages();
</script>

</body>
</html>
