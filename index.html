<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        img {
            width: 100%;
            border-radius: 10px;
            border: 2px solid #444;
            display: block;
        }
    </style>
</head>
<body>

<h1>Robot Gallery</h1>

<div id="gallery"></div>

<script>
const images = [
    "images/Screenshot 2026-06-21 at 7.00.20 PM.png",
    "images/Screenshot 2026-06-21 at 7.00.28 PM.png",
    "images/Screenshot 2026-06-21 at 7.00.46 PM.png",
    "images/Screenshot 2026-06-21 at 7.00.54 PM.png"
];

const gallery = document.getElementById("gallery");

images.forEach(src => {
    const img = document.createElement("img");
    img.src = encodeURI(src);
    img.loading = "lazy";
    gallery.appendChild(img);
});
</script>

</body>
</html>
